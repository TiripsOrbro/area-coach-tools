<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Coach Tools</title>
  <style>
    :root {
      --bg: #141018;
      --ink: #f6f1ff;
      --muted: rgba(246,241,255,.7);
      --accent: #c084fc;
      --card: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(192,132,252,.28), transparent 55%),
        linear-gradient(160deg, #120c18, #1c1426 50%, #141018);
    }
    .panel {
      width: min(440px, calc(100vw - 32px));
      padding: 32px 28px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 6px; font-size: 1.6rem; letter-spacing: -.02em; }
    p { margin: 0 0 22px; color: var(--muted); }
    .users { display: grid; gap: 12px; }
    button.user {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.22);
      color: var(--ink);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, transform .15s, background .15s;
    }
    button.user:hover {
      border-color: rgba(192,132,252,.55);
      background: rgba(192,132,252,.12);
      transform: translateY(-1px);
    }
    button.user .name { font-size: 1.25rem; font-weight: 700; }
    button.user .meta { margin-top: 4px; font-size: .9rem; color: var(--muted); }
    .status { margin-top: 16px; min-height: 1.2em; color: var(--muted); font-size: .9rem; }
    .bad { color: #fda4af; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Area Coach Tools</h1>
    <p>Choose who is logging in on this PC.</p>
    <div class="users" id="users"></div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const status = document.getElementById('status');
    const usersEl = document.getElementById('users');

    async function boot() {
      try {
        const data = await window.coachApi.listUsers();
        usersEl.innerHTML = (data.users || []).map((u) => {
          const regionLabel =
            u.region === 'ALL' ? 'All stores' : u.region ? `${u.region} stores` : '';
          return `
          <button class="user" data-id="${u.id}">
            <div class="name">${u.displayName}</div>
            <div class="meta">${regionLabel}${regionLabel ? ' · ' : ''}MMX ${u.mmxConfigured ? 'ready' : 'needs setup'} · LifeLenz ${u.lifelenzConfigured ? 'ready' : 'needs setup'}</div>
          </button>`;
        }).join('');
        usersEl.querySelectorAll('button.user').forEach((btn) => {
          btn.addEventListener('click', async () => {
            status.textContent = `Signing in as ${btn.querySelector('.name').textContent}…`;
            status.className = 'status';
            try {
              const result = await window.coachApi.login(btn.dataset.id);
              if (!result.success) throw new Error(result.error || 'Login failed');
              status.textContent = 'Starting tools…';
              await window.coachApi.openTools();
            } catch (err) {
              status.className = 'status bad';
              status.textContent = err.message || String(err);
            }
          });
        });
      } catch (err) {
        status.className = 'status bad';
        status.textContent = err.message || String(err);
      }
    }
    boot();
  </script>
</body>
</html>
